<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:"Georgia", serif;
}

/* BACKGROUND */
body{
  background:
  linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.55)),
  url("pngtree-evolving-space-mysterious-fantasy-astrophysics-photo-image_11246338.jpg");
  background-size:cover;
  background-position:center;
  color:white;
}

/* CENTER CONTENT */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* TEXT */
.hero h1{
  font-size:60px;
}

.hero p{
  font-size:22px;
  margin-top:10px;
}

/* ARROW BELOW TEXT */
.arrow{
  margin-top:25px;
  font-size:50px;
  color:white;
  text-decoration:none;
  font-family: "Arial", sans-serif;
  font-weight: 300;
  opacity:0.85;
  transition: all 0.3s ease;
  animation: bounce 1.8s infinite;
}

/* hover effect */
.arrow:hover{
  opacity:1;
  transform: translateY(6px);
}

/* subtle bounce animation */
@keyframes bounce{
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(8px); }
}
