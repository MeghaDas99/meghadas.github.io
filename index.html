<style>

/* RESET */
*{
margin:0;

html,body{

/* FULL PAGE */
body{
background:
linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.55)),
url("pngtree-evolving-space-mysterious-fantasy-astrophysics-photo-image_11246338.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
color:white;
position:relative;
}

@keyframes moveStars{
0%{transform:translate(0,0);}
100%{transform:translate(-400px,-200px);}
}

/* CENTER CONTENT */
.hero{
position:relative;
z-index:2;
height:100vh;

justify-content:center;
align-items:center;
text-align:center;

}

.content h1{

.content p{
font-size:28px;

text-transform:uppercase;
margin-bottom:60px;
font-family:Arial, sans-serif;
color:#f5d98f;
}

/* ARROW */
.arrow{
display:inline-block;
width:70px;
height:70px;
line-height:70px;
border:2px solid rgba(255,255,255,0.75);
border-radius:50%;
font-size:42px;
color:white;
text-decoration:none;
transition:0.3s;
animation:bounce 2s infinite;
}

.arrow:hover{
background:white;
color:#0b1020;
transform:scale(1.08);
}

@keyframes bounce{
0%,20%,50%,80%,100%{
transform:translateY(0);
}
40%{
transform:translateY(12px);
}
60%{
transform:translateY(6px);
}
}

/* SMALL FOOT TEXT */
.scroll-note{
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);
font-family:Arial, sans-serif;
font-size:13px;
letter-spacing:4px;
color:#d8d8d8;
z-index:2;
}

/* MOBILE */
@media(max-width:768px){

.content h1{
font-size:64px;
}

letter-spacing:2px;
}

.arrow{
width:58px;
height:58px;

}
